<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Доступ к гайду</title>
    <style>
        body { font-family: sans-serif; margin: 2rem; }
        .container { max-width: 500px; margin: auto; text-align: center; }
        input, button { padding: 8px; margin: 5px; }
    </style>
</head>
<body>
<div class="container">
    <h1>Доступ к гайду</h1>
    <p>Этот гайд доступен только участникам боевой школы Revival (Discord канал-<a href="https://discord.gg/bnsgambler">Revival BnS</a>)</p>
    <p>Напишите боту команду <code>!guide</code> в разделе #guide</p>
</div>

<script>
    const SECRET_KEY = 'aB3dE5fG7hJ9kL1m';          // Тот же ключ, что у бота
    const COOKIE_NAME = 'guide_access';
    const COOKIE_DAYS = 60;

	// Если куки уже есть – сразу переходим на гайд
    if (getCookie(COOKIE_NAME) === 'aB3dE5fG7hJ9kL1m') {
        window.location.replace('guide.html');
    }

    function setCookie(name, value, days) {
        let expires = '';
        if (days) {
            const date = new Date();
            date.setTime(date.getTime() + days * 24 * 60 * 60 * 1000);
            expires = '; expires=' + date.toUTCString();
        }
        document.cookie = name + '=' + (value || '') + expires + '; path=/';
    }

    function getCookie(name) {
        const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
        return match ? match[2] : null;
    }

    // Обработка параметра ?key=... (ссылка от бота)
    const urlParams = new URLSearchParams(window.location.search);
    const keyFromUrl = urlParams.get('key');
    if (keyFromUrl && keyFromUrl === SECRET_KEY) {
        setCookie(COOKIE_NAME, 'aB3dE5fG7hJ9kL1m', COOKIE_DAYS);
        window.location.replace('guide.html');
    }

</script>
</body>
</html>
